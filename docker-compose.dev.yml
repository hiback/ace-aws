services:
  postgres:
    image: postgres:18-alpine
    container_name: ace-aws-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ace-aws
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - ace-aws-postgres-dev:/var/lib/postgresql
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  ace-aws-postgres-dev:
